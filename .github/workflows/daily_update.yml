name: 🤖 Daily AI Crypto Progress

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy yfinance requests scikit-learn xgboost lightgbm ta

      - name: Run daily progress script
        run: python .github/scripts/daily_update.py

      - name: Configure Git
        run: |
          git config --global user.name "maic93"
          git config --global user.email "worldboy.mostafa@gmail.com"

      - name: Commit and push
        run: |
          git add .
          git diff --staged --quiet || git commit -m "$(python .github/scripts/get_commit_message.py)"
          git push
