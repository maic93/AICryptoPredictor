name: 🤖 Daily AI Crypto Progress

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy yfinance requests scikit-learn xgboost lightgbm ta matplotlib seaborn plotly scipy

      - name: Run daily progress script
        run: python .github/scripts/daily_update.py

      - name: Configure Git
        run: |
          git config --global user.name "maic93"
          git config --global user.email "maic93@users.noreply.github.com"

      - name: Commit and push (with retry)
        run: |
          git add .
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "$(python .github/scripts/get_commit_message.py)"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push failed, retrying ($i/5)..."
            sleep 5
          done
