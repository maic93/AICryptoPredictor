name: ✅ CI — Tests on every push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy yfinance scikit-learn xgboost lightgbm pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short
